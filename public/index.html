<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A1 Asphalt - AI Assistant</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle, #2c2c2c 0%, #1a1a1a 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Top Title - Nailed the font and spacing */
        #status-text {
            margin-bottom: 30px;
            font-size: 1.2rem;
            letter-spacing: 2px;
            font-weight: 300;
            color: #ffcc00; 
            text-transform: uppercase;
        }

        #orb-container {
            position: relative;
            width: 250px;
            height: 250px;
            cursor: pointer;
        }

        .orb {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, #ffcc00 0%, #e6b800 70%);
            box-shadow: 0 0 60px rgba(255, 204, 0, 0.5);
            z-index: 2;
        }

        /* The Sun Halo */
        .orb-glow {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            background: #ffcc00;
            filter: blur(40px);
            opacity: 0.3;
            transition: opacity 0.5s ease;
        }

        /* Breathes only when AI is speaking */
        body.speaking .orb-glow {
            opacity: 0.8;
            animation: breathe 2.5s infinite ease-in-out;
        }

        /* Solid and still when Joe is talking (Listening) */
        body.listening .orb-glow {
            opacity: 0.6;
            animation: none;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        /* Branding at the bottom instead of the greeting text */
        #branding-footer {
            position: absolute;
            bottom: 40px;
            width: 100%;
            font-size: 1rem;
            color: rgba(255, 204, 0, 0.7);
            text-align: center;
            letter-spacing: 1px;
            font-weight: 400;
        }
    </style>
</head>
<body class="idle">

    <div id="status-text">TALK TO OUR AI TEAM MEMBER</div>

    <div id="orb-container" onclick="toggleAssistant()">
        <div class="orb"></div>
        <div class="orb-glow"></div>
    </div>

    <div id="branding-footer">A1 PROFESSIONAL ASPHALT & SEALING LLC</div>

    <script>
        // Smart Timer & Greeting Logic
        function getJoeGreeting() {
            const now = new Date().getTime();
            const twelveHours = 12 * 60 * 60 * 1000; 
            const lastSeen = localStorage.getItem('voxTalk_lastSeen');
            localStorage.setItem('voxTalk_lastSeen', now);

            // If returning within 12 hours, we can stay quiet or use the "Welcome back"
            if (lastSeen && (now - lastSeen < twelveHours)) {
                return "Welcome back, Joe. Ready to pick up where we left off?";
            }
            
            // Initial session greeting
            return "Hello Joe, how can I help you today?";
        }

        window.onload = () => {
            const greeting = getJoeGreeting();
            // We don't print the greeting now; we just trigger the voice
            if (greeting && typeof speakText === "function") {
                setMode('speaking');
                speakText(greeting); // This assumes your voice function is named speakText
            }
        };

        function setMode(mode) {
            document.body.className = mode; 
            const statusLabel = document.getElementById('status-text');
            
            if (mode === 'listening') {
                statusLabel.textContent = "I'M LISTENING...";
            } else if (mode === 'speaking') {
                statusLabel.textContent = "AI TEAM MEMBER SPEAKING";
            } else {
                statusLabel.textContent = "TALK TO OUR AI TEAM MEMBER";
            }
        }

        function toggleAssistant() {
            // This is where your WebRTC/Voice connection logic triggers
            setMode('listening');
        }
    </script>
</body>
</html>
