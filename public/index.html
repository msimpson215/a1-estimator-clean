<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A1 Brain</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            height: 100vh;
            background: radial-gradient(circle, #252525 0%, #000000 100%); 
            color: #FED100; /* HIGHWAY SAFETY YELLOW */
            font-family: 'Arial Narrow', sans-serif; 
            font-weight: 300; /* UNBOLDED */
            overflow: hidden;
        }

        #status-text {
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #orb-container {
            width: 220px;
            height: 220px;
            cursor: pointer;
        }

        .orb {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #FED100;
            box-shadow: 0 0 60px rgba(254, 209, 0, 0.8);
        }

        body.active .orb {
            animation: pulse 1.2s infinite alternate ease-in-out;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        #footer-brand {
            font-size: 1.2rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="status-text">TALK TO OUR AI TEAM MEMBER</div>
    <div id="orb-container" onclick="toggleAssistant()">
        <div class="orb"></div>
    </div>
    <div id="footer-brand">A1 Professional Asphalt LLC</div>

    <script>
        let pc = null;
        let localStream = null;

        async function toggleAssistant() {
            // IF ALREADY RUNNING, THIS IS THE PAUSE/STOP
            if (pc) {
                pc.close();
                pc = null;
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                }
                document.body.className = 'idle';
                document.getElementById('status-text').textContent = "TALK TO OUR AI TEAM MEMBER";
                return;
            }

            document.body.className = 'active';
            document.getElementById('status-text').textContent = "LISTENING...";

            try {
                const r = await fetch('/session');
                const data = await r.json();
                
                pc = new RTCPeerConnection();
                const audio = document.createElement("audio");
                audio.autoplay = true;
                
                pc.ontrack = e => {
                    if (audio.srcObject !== e.streams[0]) {
                        audio.srcObject = e.streams[0];
                    }
                };

                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                pc.addTrack(localStream.getTracks()[0]);

                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                const sdpResponse = await fetch(`https://api.openai.com/v1/realtime?model=gpt-4o-realtime-preview-2024-12-17`, {
                    method: "POST",
                    body: offer.sdp,
                    headers: { 
                        Authorization: `Bearer ${data.client_secret.value}`, 
                        "Content-Type": "application/sdp" 
                    }
                });

                const answer = { type: "answer", sdp: await sdpResponse.text() };
                await pc.setRemoteDescription(answer);

            } catch (err) {
                pc = null;
                document.getElementById('status-text').textContent = "ERROR";
            }
        }
    </script>
</body>
</html>
