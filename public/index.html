<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A1 Asphalt - AI Assistant</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle, #2c2c2c 0%, #1a1a1a 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #status-text {
            margin-bottom: 40px;
            font-size: 1.2rem;
            letter-spacing: 2px;
            font-weight: 300;
            color: #ffcc00; 
            text-transform: uppercase;
        }

        #orb-container {
            position: relative;
            width: 250px;
            height: 250px;
            cursor: pointer;
        }

        .orb {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, #ffcc00 0%, #e6b800 70%);
            box-shadow: 0 0 60px rgba(255, 204, 0, 0.5);
            z-index: 2;
        }

        .orb-glow {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            background: #ffcc00;
            filter: blur(45px);
            opacity: 0.3;
            transition: opacity 0.5s ease;
        }

        /* Movement only during AI speech */
        body.speaking .orb-glow {
            opacity: 0.8;
            animation: breathe 2.5s infinite ease-in-out;
        }

        body.listening .orb-glow {
            opacity: 0.6;
            animation: none;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.18); }
        }

        /* Branding moved further down for better spacing */
        #branding-footer {
            position: absolute;
            bottom: 30px; 
            width: 100%;
            font-size: 0.95rem;
            color: rgba(255, 204, 0, 0.6);
            text-align: center;
            letter-spacing: 1.5px;
            font-weight: 400;
        }
    </style>
</head>
<body class="idle">

    <div id="status-text">TALK TO OUR AI TEAM MEMBER</div>

    <div id="orb-container" onclick="startConnection()">
        <div class="orb"></div>
        <div class="orb-glow"></div>
    </div>

    <div id="branding-footer">A1 PROFESSIONAL ASPHALT & SEALING LLC</div>

    <script>
        // Timing logic for Joe
        function getJoeGreeting() {
            const now = new Date().getTime();
            const twelveHours = 12 * 60 * 60 * 1000; 
            const lastSeen = localStorage.getItem('voxTalk_lastSeen');
            localStorage.setItem('voxTalk_lastSeen', now);

            if (lastSeen && (now - lastSeen < twelveHours)) {
                return "Welcome back, Joe. Ready to pick up where we left off?";
            }
            return "Hello Joe, how can I help you today?";
        }

        // Mode switcher for the UI
        function setMode(mode) {
            document.body.className = mode; 
            const statusLabel = document.getElementById('status-text');
            if (mode === 'listening') statusLabel.textContent = "I'M LISTENING...";
            else if (mode === 'speaking') statusLabel.textContent = "AI TEAM MEMBER SPEAKING";
            else statusLabel.textContent = "TALK TO OUR AI TEAM MEMBER";
        }

        // This triggers when Joe clicks the Sun
        function startConnection() {
            setMode('listening');
            // INSERT YOUR WEBRTC INIT CODE HERE
            console.log("Starting VoxTalk connection...");
        }

        window.onload = () => {
            const greeting = getJoeGreeting();
            // Once connected, you'll trigger the 'speaking' mode 
            // and pass 'greeting' to your audio output.
        };
    </script>
</body>
</html>
