<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>A1 Brain</title>

  <style>
    :root{
      --bg1:#252525;
      --bg2:#000000;
      --yellow:#FED100;
      --muted: rgba(254,209,0,0.70);
      --muted2: rgba(254,209,0,0.45);
      --stroke: rgba(254,209,0,0.22);
      --panel: rgba(0,0,0,0.25);
    }

    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle, var(--bg1) 0%, var(--bg2) 100%);
      color: var(--yellow);
      font-family: "Arial Narrow", Arial, sans-serif;
      font-weight: 300;
      overflow: hidden;
      user-select: none;
    }

    #overlay{
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 22px;
    }

    #panel{
      width: min(460px, calc(100vw - 44px));
      border-radius: 18px;
      padding: 18px 18px 14px;
      background: var(--panel);
      border: 1px solid var(--stroke);
      backdrop-filter: blur(6px);
      box-shadow: 0 18px 50px rgba(0,0,0,0.55);
      display: flex;
      flex-direction: column;
      align-items: center;

      /* IMPORTANT: reserve space so nothing shifts */
      gap: 10px;
    }

    /* Reserve space even when "hidden" to prevent layout jump */
    #headline {
      font-size: 0.98rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.2;
      color: var(--muted);
      padding: 0 6px;
      min-height: 2.4em; /* reserve 2 lines */
      display: grid;
      place-items: center;
    }
    .hide-soft { visibility: hidden; }

    #orb-container {
      width: 185px;   /* slightly smaller */
      height: 185px;
      cursor: pointer;
      display: grid;
      place-items: center;
    }

    .orb {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background-color: var(--yellow);
      box-shadow: 0 0 58px rgba(254, 209, 0, 0.78);
      transform: scale(1);
      transition: transform 260ms ease, box-shadow 260ms ease;
    }

    #orb-container:hover .orb{
      transform: scale(1.03);
      box-shadow: 0 0 75px rgba(254,209,0,0.9);
    }

    body.active .orb {
      transform: scale(1.12);
      box-shadow: 0 0 100px rgba(254, 209, 0, 1);
      animation: pulse 1.35s infinite alternate ease-in-out;
    }

    @keyframes pulse {
      0%   { transform: scale(1.08); box-shadow: 0 0 68px rgba(254,209,0,0.75); }
      100% { transform: scale(1.15); box-shadow: 0 0 112px rgba(254,209,0,1); }
    }

    #status-text{
      font-size: 0.86rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.2;
      color: var(--yellow);
      opacity: 0.90;
      min-height: 1.2em; /* reserve 1 line always */
    }

    #hint{
      font-size: 0.82rem;
      color: var(--muted2);
      text-align: center;
      line-height: 1.2;
      min-height: 1.1em; /* reserve 1 line always */
      margin-top: -2px;
    }

    #footer {
      text-align: center;
      opacity: 0.60;
      text-transform: uppercase;
      letter-spacing: 1px;
      line-height: 1.2;
      margin-top: 2px;
    }

    #footer .brand { font-size: 0.82rem; }
    #footer .phone { font-size: 0.78rem; opacity: 0.9; margin-top: 4px; }

    body.starting #orb-container { pointer-events: none; opacity: 0.95; }
  </style>
</head>

<body class="idle">
  <div id="overlay">
    <div id="panel">
      <div id="headline">Press to start a conversation with our AI team member</div>

      <div id="orb-container" onclick="toggleAssistant()">
        <div class="orb"></div>
      </div>

      <div id="status-text"></div>
      <div id="hint">Click outside this box to return to the website</div>

      <div id="footer">
        <div class="brand">A1 Professional Asphalt &amp; Concrete</div>
        <div class="phone">(618) 929-3301</div>
      </div>
    </div>
  </div>

  <script>
    let pc = null
    let localStream = null
    let starting = false

    const statusEl = document.getElementById('status-text')
    const headlineEl = document.getElementById('headline')
    const hintEl = document.getElementById('hint')

    function setIdle(){
      document.body.className = 'idle'
      statusEl.textContent = ''
      headlineEl.classList.remove('hide-soft')
      hintEl.textContent = 'Click outside this box to return to the website'
      starting = false
    }

    function setStarting(){
      document.body.className = 'starting'
      statusEl.textContent = 'STARTING…'
      headlineEl.classList.remove('hide-soft')
      hintEl.textContent = 'Click outside this box to return to the website'
    }

    function setActive(){
      document.body.className = 'active'
      statusEl.textContent = 'LISTENING…'
      // Hide headline without shifting layout
      headlineEl.classList.add('hide-soft')
      hintEl.textContent = 'Click orb to pause'
    }

    async function hardStop(){
      try{
        if (pc) { try { pc.close() } catch {} pc = null }
        if (localStream) {
          try { localStream.getTracks().forEach(t => t.stop()) } catch {}
          localStream = null
        }
      } finally {
        setIdle()
      }
    }

    document.getElementById('overlay').addEventListener('click', async (e) => {
      if (e.target.id !== 'overlay') return
      await hardStop()
      try { window.parent.postMessage({ type: 'voxtalk-close' }, '*') } catch {}
      try { window.close() } catch {}
      try { history.back() } catch {}
    })

    async function toggleAssistant(){
      // Stop / pause if running OR starting
      if (pc || starting) {
        await hardStop()
        return
      }

      starting = true
      setStarting()

      try {
        const r = await fetch('/session')
        const data = await r.json()

        pc = new RTCPeerConnection()

        const audio = document.createElement('audio')
        audio.autoplay = true

        pc.ontrack = (e) => {
          if (audio.srcObject !== e.streams[0]) {
            audio.srcObject = e.streams[0]
          }
        }

        localStream = await navigator.mediaDevices.getUserMedia({ audio: true })
        pc.addTrack(localStream.getTracks()[0])

        const offer = await pc.createOffer()
        await pc.setLocalDescription(offer)

        const sdpResponse = await fetch(
          "https://api.openai.com/v1/realtime?model=gpt-4o-realtime-preview-2024-12-17",
          {
            method: "POST",
            body: offer.sdp,
            headers: {
              Authorization: `Bearer ${data.client_secret.value}`,
              "Content-Type": "application/sdp"
            }
          }
        )

        const answer = { type: "answer", sdp: await sdpResponse.text() }
        await pc.setRemoteDescription(answer)

        setActive()
      } catch (err) {
        console.error(err)
        pc = null
        if (localStream) {
          try { localStream.getTracks().forEach(t => t.stop()) } catch {}
          localStream = null
        }
        document.body.className = 'idle'
        statusEl.textContent = 'ERROR'
        starting = false
        headlineEl.classList.remove('hide-soft')
        hintEl.textContent = 'Click outside this box to return to the website'
      }
    }

    setIdle()
  </script>
</body>
</html>
