<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A1 Asphalt - AI Assistant</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #1a1a1a; /* Solid Asphalt Black */
            color: #ffcc00; /* Traffic Yellow */
            font-family: 'Segoe UI', 'Impact', sans-serif; /* Elongated professional font */
            overflow: hidden;
        }

        #status-text {
            margin-bottom: 40px;
            font-size: 1.6rem; /* Bigger as requested */
            letter-spacing: 3px;
            font-weight: bold;
            text-transform: uppercase;
        }

        #orb-container {
            position: relative;
            width: 250px;
            height: 250px;
            cursor: pointer;
        }

        .orb {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #ffcc00; /* Pure Traffic Yellow - No Gold Gradient */
            box-shadow: 0 0 50px rgba(255, 204, 0, 0.4);
        }

        /* Pulsate effect when talking */
        body.speaking .orb {
            animation: pulse 1.5s infinite alternate ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); }
        }

        #footer-brand {
            position: absolute;
            bottom: 30px;
            font-size: 0.9rem; /* Smaller than the top text */
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: normal;
        }
    </style>
</head>
<body class="idle">

    <div id="status-text">TALK TO OUR AI TEAM MEMBER</div>

    <div id="orb-container" onclick="toggleAssistant()">
        <div class="orb"></div>
    </div>

    <div id="footer-brand">A1 Professional Asphalt LLC</div>

    <script>
        let isActive = false;

        async function toggleAssistant() {
            isActive = !isActive;
            const status = document.getElementById('status-text');
            
            if (isActive) {
                document.body.className = 'speaking';
                status.textContent = "LISTENING...";
                
                // This is where your /session call and WebRTC logic go
                try {
                    const response = await fetch('/session');
                    const data = await response.json();
                    // WebRTC logic uses data.client_secret.value
                } catch (e) {
                    status.textContent = "CONNECTION ERROR";
                }
            } else {
                document.body.className = 'idle';
                status.textContent = "TALK TO OUR AI TEAM MEMBER";
            }
        }
    </script>
</body>
</html>
